name: Index Bloat Audit

on:
  schedule:
    # 03:00 UTC = 11:00 Taiwan time (after the README updater's 02:00 run)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Audit sitemap for tag/archive index bloat
        run: python .github/index_bloat_audit.py --report

      - name: Commit baseline only when archive counts change
        run: |
          # git status (not git diff) so a brand-new untracked baseline on the
          # first run is also detected.
          if [ -z "$(git status --porcelain .github/index_bloat_state.json)" ]; then
            echo "No change in archive counts."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/index_bloat_state.json
          git commit -m "Index bloat audit: archive page counts changed"
          git push
